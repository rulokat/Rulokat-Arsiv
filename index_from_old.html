<style>
  /* ── INLINE SVG ICONS ── */
  .ico-svg { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; vertical-align:middle; flex-shrink:0; }
  .ico-svg svg { width:100%; height:100%; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
  .ico-lg .ico-svg { width:20px; height:20px; }

  /* ── MEDIA MODULE ── */
  .media-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    width: 140px;
    flex-shrink: 0;
  }
  .media-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .media-poster {
    width: 100%; aspect-ratio: 2/3;
    background: var(--surface2);
    position: relative; overflow: hidden;
  }
  .media-type-badge {
    position: absolute; top: 6px; left: 6px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 3px;
    color: #000; font-family: 'IBM Plex Sans', sans-serif;
    text-transform: uppercase;
  }
  .media-info { padding: 8px 10px 10px; }
  .media-title {
    font-size: 12px; font-weight: 500; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; line-height: 1.4; margin-bottom: 4px;
  }
  .media-search-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .media-search-row:hover { background: var(--surface2); }
  .media-search-row:last-child { border-bottom: none; }
</style>

<script>
// Module initialization fixes
function switchSidebarTab(tab) {
  window.currentTab = tab;
  
  // Panelleri göster/gizle (safe checks)
  if (!isMobile()) {
    const panels = {
      'notes': ['note-list-panel', 'editor-panel', 'new-note-btn'],
      'bm': ['bm-panel'],
      'pw': ['pw-panel'],
      'media': ['media-panel'],
      'stats': ['stats-panel'],
      'canvas': ['canvas-panel'],
      'dash': ['dash-panel'],
      'gofile': ['gofile-panel']
    };
    
    // Tüm panelleri gizle
    Object.values(panels).flat().forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    
    // Seçilen panelleri göster
    if (panels[tab]) {
      panels[tab].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'flex';
      });
    }
  }
  
  // Modülleri render et
  if (tab === 'bm' && typeof renderBmTagList === 'function') { 
    renderBmTagList(); 
    if (typeof renderBookmarks === 'function') renderBookmarks();
  }
  if (tab === 'pw' && typeof renderPwGrid === 'function') renderPwGrid();
  if (tab === 'media' && typeof renderMediaGrid === 'function') renderMediaGrid();
  if (tab === 'stats' && typeof renderStats === 'function') renderStats();
  if (tab === 'canvas' && typeof cvLoad === 'function') {
    cvLoad();
    if (typeof cvRender === 'function') cvRender();
  }
  if (tab === 'notes' && typeof renderNoteList === 'function') renderNoteList();
}

// toggleAcc override - modülleri render et
const origToggleAcc = window.toggleAcc;
window.toggleAcc = function(tab) {
  origToggleAcc(tab);
  setTimeout(() => switchSidebarTab(tab), 50);
};
</script>
